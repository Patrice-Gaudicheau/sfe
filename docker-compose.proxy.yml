services:
  sfe-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: sfe-proxy:local
    container_name: sfe-proxy
    environment:
      SFE_PROXY_HOST: 0.0.0.0
      SFE_PROXY_PORT: 17891
      SFE_PROXY_PROVIDER: ${SFE_PROXY_PROVIDER:-openai-compatible}
      SFE_PROXY_MODE: ${SFE_PROXY_MODE:-pass_through}
      SFE_PROXY_UPSTREAM_BASE_URL: ${SFE_PROXY_UPSTREAM_BASE_URL:-}
      SFE_PROXY_UPSTREAM_API_KEY: ${SFE_PROXY_UPSTREAM_API_KEY:-}
      ALIBABA_API_KEY: ${ALIBABA_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      SFE_ALIBABA_BASE_URL: ${SFE_ALIBABA_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode}
      SFE_ALIBABA_MODEL: ${SFE_ALIBABA_MODEL:-}
      SFE_ANTHROPIC_API_KEY: ${SFE_ANTHROPIC_API_KEY:-}
      SFE_ANTHROPIC_BASE_URL: ${SFE_ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      SFE_ANTHROPIC_VERSION: ${SFE_ANTHROPIC_VERSION:-2023-06-01}
      SFE_ANTHROPIC_MODEL: ${SFE_ANTHROPIC_MODEL:-}
      SFE_ANTHROPIC_API_TIMEOUT: ${SFE_ANTHROPIC_API_TIMEOUT:-60}
      SFE_ANTHROPIC_MAX_TOKENS: ${SFE_ANTHROPIC_MAX_TOKENS:-1024}
      SFE_ANTHROPIC_MIN_REQUEST_INTERVAL_SECONDS: ${SFE_ANTHROPIC_MIN_REQUEST_INTERVAL_SECONDS:-0}
      SFE_ANTHROPIC_MAX_INPUT_CHARS: ${SFE_ANTHROPIC_MAX_INPUT_CHARS:-0}
      SFE_ANTHROPIC_RETRY_ON_RATE_LIMIT: ${SFE_ANTHROPIC_RETRY_ON_RATE_LIMIT:-false}
      SFE_ANTHROPIC_MAX_RETRY_SLEEP_SECONDS: ${SFE_ANTHROPIC_MAX_RETRY_SLEEP_SECONDS:-10}
      SFE_PROXY_SHADOW_MIN_INPUT_TOKENS: ${SFE_PROXY_SHADOW_MIN_INPUT_TOKENS:-50000}
      SFE_PROXY_SHADOW_LOG_DIR: ${SFE_PROXY_SHADOW_LOG_DIR:-logs/sfe_proxy_shadow}
      SFE_PROXY_SHADOW_LOG_FULL_PAYLOADS: ${SFE_PROXY_SHADOW_LOG_FULL_PAYLOADS:-false}
      SFE_PROXY_SHADOW_SELECTION_DRY_RUN: ${SFE_PROXY_SHADOW_SELECTION_DRY_RUN:-false}
      SFE_PROXY_SHADOW_ROUTER_DRY_RUN: ${SFE_PROXY_SHADOW_ROUTER_DRY_RUN:-false}
      SFE_PROXY_SHADOW_ROUTER_PROVIDER: ${SFE_PROXY_SHADOW_ROUTER_PROVIDER:-disabled}
      SFE_PROXY_SHADOW_ROUTER_TIMEOUT_SECONDS: ${SFE_PROXY_SHADOW_ROUTER_TIMEOUT_SECONDS:-30}
      SFE_LEMONADE_BASE_URL: ${SFE_LEMONADE_BASE_URL:-http://127.0.0.1:13305}
      SFE_LEMONADE_API_KEY: ${SFE_LEMONADE_API_KEY:-}
      SFE_LEMONADE_MODEL: ${SFE_LEMONADE_MODEL:-}
      SFE_ROUTER_MODEL: ${SFE_ROUTER_MODEL:-}
      SFE_OPENAI_ROUTER_MODEL: ${SFE_OPENAI_ROUTER_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "${SFE_PROXY_HOST:-127.0.0.1}:${SFE_PROXY_PORT:-17891}:17891"
    restart: "no"
